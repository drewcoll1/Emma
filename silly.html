<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World's Best Girlfriend Award</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe4ec, #fff7d6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      color: #ff4f87;
      margin-bottom: 10px;
    }

    img {
      width: 300px;
      border-radius: 15px;
      border: 5px solid gold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏆 World's Best Girlfriend 🏆</h1>
    <p>Officially certified 💯</p>
    <img src="girlfriend.jpg" alt="Best Girlfriend">
  </div>
</body>
</html>
