<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World's Best Girlfriend Award</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe4ec, #fff7d6);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #ff4f87;
    }

    p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 20px;
    }

    img {
      width: 100%;
      max-width: 350px;
      border-radius: 15px;
      object-fit: cover;
      border: 5px solid #ffd166;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏆 World's Best Girlfriend Award 🏆</h1>
    <p>This award officially goes to the best girlfriend in the world.</p>
    <img src="girlfriend.jpg" alt="Best Girlfriend" />
  </div>
</body>
</html>
