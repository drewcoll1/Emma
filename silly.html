<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World's Best Girlfriend</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.28), transparent 18%),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.22), transparent 16%),
        radial-gradient(circle at 50% 85%, rgba(255,255,255,.20), transparent 22%),
        linear-gradient(-45deg, #ff2d75, #ff8a00, #ffd700, #ff6ec7, #ff2d75);
      background-size: 400% 400%;
      animation: bgMove 14s ease infinite;
    }

    @keyframes bgMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .beam-wrap {
      position: fixed;
      inset: -30vmax;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .beam {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 22vmax;
      height: 140vmax;
      transform-origin: center center;
      opacity: 0.16;
      filter: blur(10px);
      border-radius: 999px;
      background: linear-gradient(to bottom, transparent, white, transparent);
    }

    .beam.b1 { transform: translate(-50%, -50%) rotate(0deg); }
    .beam.b2 { transform: translate(-50%, -50%) rotate(30deg); }
    .beam.b3 { transform: translate(-50%, -50%) rotate(60deg); }
    .beam.b4 { transform: translate(-50%, -50%) rotate(90deg); }
    .beam.b5 { transform: translate(-50%, -50%) rotate(120deg); }
    .beam.b6 { transform: translate(-50%, -50%) rotate(150deg); }

    .beam-wrap {
      animation: spinSlow 24s linear infinite;
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .sparkles,
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .sparkles { z-index: 1; }

    .sparkle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      box-shadow:
        0 0 10px rgba(255,255,255,1),
        0 0 24px rgba(255,255,255,.95),
        0 0 40px rgba(255,255,255,.7);
      animation: twinkle 2.2s ease-in-out infinite;
    }

    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: rgba(255,255,255,.85);
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    .sparkle::before {
      width: 2px;
      height: 24px;
    }

    .sparkle::after {
      width: 24px;
      height: 2px;
    }

    .sparkle:nth-child(1)  { top: 8%;  left: 10%; animation-delay: .1s; }
    .sparkle:nth-child(2)  { top: 16%; left: 86%; animation-delay: .8s; }
    .sparkle:nth-child(3)  { top: 28%; left: 18%; animation-delay: 1.3s; }
    .sparkle:nth-child(4)  { top: 38%; left: 92%; animation-delay: .5s; }
    .sparkle:nth-child(5)  { top: 50%; left: 7%;  animation-delay: 1.8s; }
    .sparkle:nth-child(6)  { top: 62%; left: 82%; animation-delay: .9s; }
    .sparkle:nth-child(7)  { top: 76%; left: 16%; animation-delay: 1.5s; }
    .sparkle:nth-child(8)  { top: 84%; left: 70%; animation-delay: .3s; }
    .sparkle:nth-child(9)  { top: 22%; left: 52%; animation-delay: 1.1s; }
    .sparkle:nth-child(10) { top: 70%; left: 56%; animation-delay: .6s; }
    .sparkle:nth-child(11) { top: 44%; left: 35%; animation-delay: 1.9s; }
    .sparkle:nth-child(12) { top: 12%; left: 62%; animation-delay: .4s; }

    @keyframes twinkle {
      0%, 100% { transform: scale(.45) rotate(0deg); opacity: .45; }
      50% { transform: scale(1.45) rotate(45deg); opacity: 1; }
    }

    .hearts {
      z-index: 2;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -80px;
      font-size: clamp(22px, 4.5vw, 40px);
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.18));
      opacity: .9;
      animation: floatUp linear infinite;
    }

    .heart:nth-child(1) { left: 4%;  animation-duration: 8.5s; animation-delay: 0s; }
    .heart:nth-child(2) { left: 14%; animation-duration: 10.5s; animation-delay: 1.6s; }
    .heart:nth-child(3) { left: 24%; animation-duration: 9.2s; animation-delay: .7s; }
    .heart:nth-child(4) { left: 36%; animation-duration: 11.5s; animation-delay: 2.2s; }
    .heart:nth-child(5) { left: 48%; animation-duration: 8.8s; animation-delay: 1.1s; }
    .heart:nth-child(6) { left: 60%; animation-duration: 10.8s; animation-delay: .3s; }
    .heart:nth-child(7) { left: 72%; animation-duration: 9.5s; animation-delay: 2.5s; }
    .heart:nth-child(8) { left: 84%; animation-duration: 11.2s; animation-delay: 1.4s; }
    .heart:nth-child(9) { left: 93%; animation-duration: 8.3s; animation-delay: .9s; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) scale(.7) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: .95;
      }
      100% {
        transform: translateY(-125vh) translateX(35px) scale(1.3) rotate(18deg);
        opacity: 0;
      }
    }

    .halo {
      position: absolute;
      width: min(92vw, 620px);
      height: min(92vw, 620px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.65) 0%, rgba(255,255,255,.22) 25%, transparent 70%);
      filter: blur(18px);
      z-index: 2;
      animation: haloPulse 3.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes haloPulse {
      0%, 100% { transform: scale(1); opacity: .9; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 5;
      width: min(92vw, 560px);
      padding: 18px;
      border-radius: 38px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,245,249,.95));
      box-shadow:
        0 30px 70px rgba(0,0,0,.24),
        0 0 0 10px rgba(255,255,255,.16),
        0 0 50px rgba(255,255,255,.48);
      animation: cardEnter 1s ease, hoverCard 4.2s ease-in-out infinite;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 38px;
      padding: 8px;
      background: linear-gradient(135deg, #fff8b0, #ffd700, #ffffff, #ff80bf, #ffd700, #fff8b0);
      background-size: 300% 300%;
      animation: borderShift 5s linear infinite;
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -20%;
      background: linear-gradient(120deg, transparent 25%, rgba(255,255,255,.65) 50%, transparent 75%);
      transform: translateX(-120%) rotate(8deg);
      animation: megaShine 3.8s linear infinite;
      pointer-events: none;
    }

    @keyframes borderShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @keyframes megaShine {
      100% { transform: translateX(120%) rotate(8deg); }
    }

    @keyframes cardEnter {
      0% {
        transform: scale(.78) rotate(-4deg);
        opacity: 0;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes hoverCard {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-.5deg); }
      50% { transform: translateY(-14px) rotate(0deg); }
      75% { transform: translateY(-8px) rotate(.5deg); }
    }

    .title-wrap {
      position: relative;
      margin-bottom: 18px;
    }

    .title-glow {
      position: absolute;
      inset: auto 0 0 0;
      height: 100%;
      filter: blur(18px);
      opacity: .55;
      z-index: 0;
      background: radial-gradient(circle, rgba(255,255,255,.9) 0%, rgba(255,255,255,.2) 45%, transparent 70%);
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: clamp(2.1rem, 8.5vw, 4rem);
      line-height: .98;
      font-weight: 1000;
      letter-spacing: -1px;
      background: linear-gradient(180deg, #ff2d75 0%, #ff5c8d 35%, #ff8a00 70%, #ffd700 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 4px 0 rgba(255,255,255,.35),
        0 10px 24px rgba(255, 91, 141, .28);
      animation: titleBounce 2.8s ease-in-out infinite;
    }

    @keyframes titleBounce {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.035) translateY(-3px); }
    }

    .emoji-left,
    .emoji-right {
      position: absolute;
      top: -10px;
      font-size: clamp(28px, 6vw, 46px);
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.18));
      animation: wiggle 2.1s ease-in-out infinite;
      z-index: 2;
    }

    .emoji-left { left: -4px; }
    .emoji-right { right: -4px; animation-delay: .6s; }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      50% { transform: rotate(-9deg) translateY(-5px); }
    }

    .photo-shell {
      position: relative;
      padding: 12px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, #fff8a6, #ffd700, #ff8ac6, #ffffff, #ffd700, #fff8a6);
      background-size: 300% 300%;
      animation: shellShift 4.5s linear infinite;
      box-shadow:
        0 18px 40px rgba(255, 121, 173, .38),
        0 0 0 5px rgba(255,255,255,.78),
        inset 0 0 18px rgba(255,255,255,.55);
      transform: perspective(1000px) rotateX(1deg);
    }

    @keyframes shellShift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .photo-shell::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 36px;
      background: conic-gradient(from 0deg, rgba(255,255,255,.0), rgba(255,255,255,.9), rgba(255,255,255,.0));
      filter: blur(16px);
      opacity: .65;
      animation: spinSlow 10s linear infinite reverse;
      z-index: 0;
    }

    .photo-shell img {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 22px;
      border: 6px solid rgba(255,255,255,.98);
      box-shadow:
        0 14px 28px rgba(0,0,0,.20),
        0 0 28px rgba(255,255,255,.35);
      animation: photoPulse 3.5s ease-in-out infinite;
    }

    @keyframes photoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.018); }
    }

    .corners span {
      position: absolute;
      font-size: clamp(26px, 6vw, 42px);
      z-index: 2;
      filter: drop-shadow(0 5px 8px rgba(0,0,0,.18));
      animation: popFloat 2s ease-in-out infinite;
    }

    .corners span:nth-child(1) { top: -6px; left: -6px; }
    .corners span:nth-child(2) { top: -6px; right: -6px; animation-delay: .5s; }
    .corners span:nth-child(3) { bottom: -6px; left: -6px; animation-delay: 1s; }
    .corners span:nth-child(4) { bottom: -6px; right: -6px; animation-delay: 1.5s; }

    @keyframes popFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-5px) scale(1.08); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      z-index: 9999;
      pointer-events: none;
      border-radius: 4px;
      animation: confettiFall linear forwards;
      box-shadow: 0 0 8px rgba(255,255,255,.35);
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(115vh) rotate(900deg);
        opacity: .95;
      }
    }

    @media (max-width: 520px) {
      .card {
        width: 94vw;
        padding: 14px;
        border-radius: 28px;
      }

      .card::before {
        border-radius: 28px;
      }

      .photo-shell {
        border-radius: 22px;
        padding: 8px;
      }

      .photo-shell img {
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="beam-wrap">
    <div class="beam b1"></div>
    <div class="beam b2"></div>
    <div class="beam b3"></div>
    <div class="beam b4"></div>
    <div class="beam b5"></div>
    <div class="beam b6"></div>
  </div>

  <div class="sparkles">
    <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
    <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
    <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
    <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
  </div>

  <div class="hearts">
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💗</div>
    <div class="heart">💘</div>
    <div class="heart">💞</div>
    <div class="heart">💓</div>
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💗</div>
  </div>

  <div class="halo"></div>

  <div class="card">
    <div class="title-wrap">
      <div class="title-glow"></div>
      <div class="emoji-left">👑</div>
      <div class="emoji-right">👑</div>
      <h1>World's Best Girlfriend</h1>
    </div>

    <div class="photo-shell">
      <div class="corners">
        <span>✨</span>
        <span>💖</span>
        <span>✨</span>
        <span>💖</span>
      </div>
      <img src="emma.png" alt="Emma" />
    </div>
  </div>

  <script>
    const colors = [
      "#ff2d75", "#ff6ec7", "#ffd700", "#ffffff",
      "#ff8a00", "#7dd3fc", "#c084fc", "#86efac"
    ];

    function createConfetti() {
      const piece = document.createElement("div");
      piece.className = "confetti";

      const size = Math.random() * 12 + 6;
      const isCircle = Math.random() > 0.7;
      piece.style.width = size + "px";
      piece.style.height = (isCircle ? size : size * 1.7) + "px";
      piece.style.left = Math.random() * window.innerWidth + "px";
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (Math.random() * 2.4 + 2.2) + "s";
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      piece.style.borderRadius = isCircle ? "50%" : "3px";

      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 5200);
    }

    function dropConfetti(amount = 180) {
      for (let i = 0; i < amount; i++) {
        setTimeout(createConfetti, i * 12);
      }
    }

    window.addEventListener("load", () => {
      dropConfetti(260);
      setInterval(() => dropConfetti(50), 1900);
    });
  </script>
</body>
</html>
