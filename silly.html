<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World's Best Girlfriend</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
      background: #050505;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 215, 120, 0.16), transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(255, 215, 120, 0.08), transparent 50%),
        linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
    }

    .spotlight {
      position: fixed;
      top: -25vh;
      left: 50%;
      width: 70vw;
      height: 90vh;
      transform: translateX(-50%);
      background: radial-gradient(
        ellipse at center,
        rgba(255, 223, 133, 0.22) 0%,
        rgba(255, 223, 133, 0.10) 30%,
        rgba(255, 223, 133, 0.03) 55%,
        transparent 75%
      );
      filter: blur(10px);
      pointer-events: none;
      z-index: 0;
      animation: pulseLight 4s ease-in-out infinite;
    }

    @keyframes pulseLight {
      0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 223, 133, 0.9);
      box-shadow: 0 0 10px rgba(255, 223, 133, 0.8);
      animation: floatParticle linear infinite;
    }

    .particle:nth-child(1)  { left: 8%;  top: 85%; animation-duration: 12s; animation-delay: 0s; }
    .particle:nth-child(2)  { left: 18%; top: 92%; animation-duration: 15s; animation-delay: 2s; }
    .particle:nth-child(3)  { left: 28%; top: 88%; animation-duration: 11s; animation-delay: 1s; }
    .particle:nth-child(4)  { left: 40%; top: 95%; animation-duration: 14s; animation-delay: 3s; }
    .particle:nth-child(5)  { left: 52%; top: 87%; animation-duration: 13s; animation-delay: 1.5s; }
    .particle:nth-child(6)  { left: 64%; top: 93%; animation-duration: 16s; animation-delay: 0.5s; }
    .particle:nth-child(7)  { left: 75%; top: 90%; animation-duration: 12s; animation-delay: 2.5s; }
    .particle:nth-child(8)  { left: 86%; top: 96%; animation-duration: 15s; animation-delay: 1.2s; }
    .particle:nth-child(9)  { left: 12%; top: 75%; animation-duration: 10s; animation-delay: 2.8s; }
    .particle:nth-child(10) { left: 70%; top: 78%; animation-duration: 11.5s; animation-delay: 0.8s; }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) scale(0.7);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.4);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 3;
      width: min(92vw, 560px);
      padding: 26px 22px 22px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(22,22,22,0.98), rgba(10,10,10,0.98));
      border: 1px solid rgba(255, 215, 120, 0.35);
      box-shadow:
        0 30px 70px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 0 40px rgba(255, 215, 120, 0.08);
      text-align: center;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: 2px;
      background: linear-gradient(135deg, #6e5320, #f3d27a, #8a6726, #f3d27a, #6e5320);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .title {
      margin: 0 0 22px;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #f3d27a;
      text-shadow:
        0 0 10px rgba(243, 210, 122, 0.18),
        0 0 24px rgba(243, 210, 122, 0.08);
    }

    .title span {
      display: block;
    }

    .frame {
      position: relative;
      padding: 14px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, #4b3815 0%, #f3d27a 20%, #8a6726 50%, #f3d27a 80%, #4b3815 100%);
      box-shadow:
        0 16px 30px rgba(0,0,0,0.35),
        0 0 25px rgba(243, 210, 122, 0.18);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events: none;
    }

    .frame img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 14px;
      border: 6px solid #111;
      box-shadow:
        0 10px 20px rgba(0,0,0,0.35),
        0 0 0 1px rgba(255,255,255,0.08);
      background: #111;
    }

    .shine {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 24px;
      pointer-events: none;
    }

    .shine::after {
      content: "";
      position: absolute;
      top: -20%;
      left: -30%;
      width: 40%;
      height: 140%;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(255,255,255,0.06) 35%,
        rgba(255,255,255,0.28) 50%,
        rgba(255,255,255,0.06) 65%,
        transparent 100%
      );
      transform: rotate(12deg);
      animation: sweep 5s linear infinite;
    }

    @keyframes sweep {
      0% { left: -35%; }
      100% { left: 120%; }
    }

    .corner {
      position: absolute;
      width: 34px;
      height: 34px;
      border: 2px solid rgba(243, 210, 122, 0.75);
      z-index: 4;
      pointer-events: none;
    }

    .corner.tl {
      top: 14px;
      left: 14px;
      border-right: 0;
      border-bottom: 0;
      border-top-left-radius: 10px;
    }

    .corner.tr {
      top: 14px;
      right: 14px;
      border-left: 0;
      border-bottom: 0;
      border-top-right-radius: 10px;
    }

    .corner.bl {
      bottom: 14px;
      left: 14px;
      border-right: 0;
      border-top: 0;
      border-bottom-left-radius: 10px;
    }

    .corner.br {
      bottom: 14px;
      right: 14px;
      border-left: 0;
      border-top: 0;
      border-bottom-right-radius: 10px;
    }

    .confetti {
      position: fixed;
      top: -20px;
      z-index: 9999;
      pointer-events: none;
      animation: confettiFall linear forwards;
      opacity: 0.95;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(115vh) rotate(720deg);
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .card {
        width: 95vw;
        padding: 18px 14px 14px;
        border-radius: 22px;
      }

      .card::before {
        border-radius: 22px;
      }

      .frame {
        padding: 10px;
        border-radius: 18px;
      }

      .frame img {
        border-width: 4px;
      }

      .corner {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="spotlight"></div>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <h1 class="title">
      <span>World's Best</span>
      <span>Girlfriend</span>
    </h1>

    <div class="frame">
      <div class="shine"></div>
      <img src="emma.png" alt="Emma" />
    </div>
  </div>

  <script>
    const confettiColors = ["#f3d27a", "#ffffff", "#d4af37", "#ffe8a3"];

    function createConfetti() {
      const piece = document.createElement("div");
      piece.className = "confetti";

      const size = Math.random() * 10 + 5;
      const circle = Math.random() > 0.75;

      piece.style.left = Math.random() * window.innerWidth + "px";
      piece.style.width = size + "px";
      piece.style.height = (circle ? size : size * 1.8) + "px";
      piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      piece.style.borderRadius = circle ? "50%" : "2px";
      piece.style.animationDuration = (Math.random() * 2 + 2.5) + "s";

      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 5000);
    }

    function dropConfetti(amount = 120) {
      for (let i = 0; i < amount; i++) {
        setTimeout(createConfetti, i * 18);
      }
    }

    window.addEventListener("load", () => {
      dropConfetti(160);
      setInterval(() => dropConfetti(28), 2400);
    });
  </script>
</body>
</html>
