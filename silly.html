<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World's Best Girlfriend</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe4ec, #fff7d6);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 420px;
      width: 90%;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0 0 15px;
      font-size: clamp(24px, 6vw, 32px);
      color: #ff4f87;
    }

    img {
      width: 100%;
      max-width: 300px;
      border-radius: 15px;
      border: 4px solid gold;
      object-fit: cover;
    }

    /* CONFETTI ABOVE EVERYTHING */
    .confetti {
      position: fixed;
      top: -10px;
      z-index: 9999; /* 👈 THIS puts it over the card */
      pointer-events: none;
      animation: fall linear forwards;
      border-radius: 2px;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🏆 World's Best Girlfriend 🏆</h1>
    <img src="emma.png" alt="Emma">
  </div>

  <script>
    const colors = ["#ff4f87", "#ffd700", "#7dd3fc", "#86efac", "#c084fc"];

    function createConfetti() {
      const piece = document.createElement("div");
      piece.className = "confetti";

      const size = Math.random() * 8 + 6;
      piece.style.width = size + "px";
      piece.style.height = size * 1.5 + "px";
      piece.style.left = Math.random() * window.innerWidth + "px";
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (Math.random() * 2 + 2) + "s";

      document.body.appendChild(piece);

      setTimeout(() => piece.remove(), 4000);
    }

    function dropConfetti(amount = 120) {
      for (let i = 0; i < amount; i++) {
        setTimeout(createConfetti, i * 15);
      }
    }

    // initial burst
    window.onload = () => {
      dropConfetti(120);

      // continuous light confetti
      setInterval(() => {
        dropConfetti(25);
      }, 2000);
    };
  </script>
</body>
</html>
