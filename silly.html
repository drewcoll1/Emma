<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World's Best Girlfriend Award</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe4ec, #fff7d6);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
    }

    h1 {
      color: #ff4f87;
      margin: 0 0 10px;
      font-size: clamp(22px, 6vw, 30px);
      line-height: 1.2;
    }

    p {
      color: #555;
      font-size: clamp(14px, 4vw, 18px);
      margin-bottom: 15px;
    }

    img {
      width: 100%;
      max-width: 300px;
      border-radius: 14px;
      border: 4px solid gold;
      object-fit: cover;
    }

    button {
      margin-top: 15px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #ff4f87;
      color: white;
      font-size: clamp(14px, 4vw, 16px);
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      max-width: 250px;
    }

    button:hover {
      background: #e33d74;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      top: -12px;
      width: 10px;
      height: 18px;
      opacity: 0.9;
      animation: fall linear forwards;
      z-index: 1;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
      }
    }

    /* Extra mobile tweaks */
    @media (max-width: 480px) {
      .card {
        padding: 16px;
        border-radius: 14px;
      }

      img {
        max-width: 260px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🏆 World's Best Girlfriend 🏆</h1>
    <p>Officially certified 💯</p>

    <img src="emma.png" alt="Best Girlfriend" />

    <br />
    <button onclick="dropConfetti(120)">Celebrate 🎉</button>
  </div>

  <script>
    const colors = ["#ff4f87", "#ffd700", "#7dd3fc", "#86efac", "#c084fc", "#fb7185"];

    function createConfettiPiece() {
      const piece = document.createElement("div");
      piece.className = "confetti";

      const size = Math.random() * 8 + 6;
      piece.style.width = size + "px";
      piece.style.height = size * 1.6 + "px";
      piece.style.left = Math.random() * window.innerWidth + "px";
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (Math.random() * 2 + 2) + "s";

      document.body.appendChild(piece);

      setTimeout(() => piece.remove(), 4000);
    }

    function dropConfetti(amount = 100) {
      for (let i = 0; i < amount; i++) {
        setTimeout(createConfettiPiece, i * 20);
      }
    }

    window.addEventListener("load", () => {
      dropConfetti(100);
    });
  </script>
</body>
</html>
