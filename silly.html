<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World's Best Girlfriend</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35), transparent 20%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,0.25), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.18), transparent 25%),
        linear-gradient(135deg, #ff4f87 0%, #ff7eb3 20%, #ffb347 52%, #fff1a8 100%);
      position: relative;
    }

    .bg-glow {
      position: fixed;
      inset: -10%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 20%),
        radial-gradient(circle at 70% 25%, rgba(255,255,255,0.25), transparent 18%),
        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.22), transparent 22%);
      animation: breathe 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .sparkles,
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .sparkles {
      z-index: 1;
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      box-shadow:
        0 0 12px rgba(255,255,255,1),
        0 0 22px rgba(255,255,255,0.9),
        0 0 32px rgba(255,255,255,0.7);
      animation: twinkle 2.4s infinite ease-in-out;
    }

    .sparkle:nth-child(1) { top: 10%; left: 12%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 18%; left: 84%; animation-delay: .7s; }
    .sparkle:nth-child(3) { top: 32%; left: 8%; animation-delay: 1.1s; }
    .sparkle:nth-child(4) { top: 40%; left: 88%; animation-delay: 1.7s; }
    .sparkle:nth-child(5) { top: 58%; left: 14%; animation-delay: .4s; }
    .sparkle:nth-child(6) { top: 70%; left: 80%; animation-delay: 1.3s; }
    .sparkle:nth-child(7) { top: 82%; left: 22%; animation-delay: .9s; }
    .sparkle:nth-child(8) { top: 88%; left: 65%; animation-delay: 1.9s; }
    .sparkle:nth-child(9) { top: 22%; left: 55%; animation-delay: .5s; }
    .sparkle:nth-child(10){ top: 76%; left: 50%; animation-delay: 1.5s; }

    @keyframes twinkle {
      0%, 100% { transform: scale(.5); opacity: .45; }
      50% { transform: scale(1.7); opacity: 1; }
    }

    .hearts {
      z-index: 2;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -60px;
      font-size: clamp(20px, 4vw, 34px);
      opacity: 0.85;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
      animation: floatUp linear infinite;
    }

    .heart:nth-child(1) { left: 5%;  animation-duration: 9s;  animation-delay: 0s; }
    .heart:nth-child(2) { left: 15%; animation-duration: 11s; animation-delay: 2s; }
    .heart:nth-child(3) { left: 28%; animation-duration: 8.5s; animation-delay: 1s; }
    .heart:nth-child(4) { left: 40%; animation-duration: 10s; animation-delay: 3s; }
    .heart:nth-child(5) { left: 53%; animation-duration: 9.5s; animation-delay: 1.4s; }
    .heart:nth-child(6) { left: 66%; animation-duration: 12s; animation-delay: .6s; }
    .heart:nth-child(7) { left: 79%; animation-duration: 8s; animation-delay: 2.6s; }
    .heart:nth-child(8) { left: 91%; animation-duration: 10.5s; animation-delay: 1.1s; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) scale(.8) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: .9;
      }
      100% {
        transform: translateY(-125vh) translateX(30px) scale(1.3) rotate(18deg);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 5;
      width: min(92vw, 520px);
      padding: 18px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,244,248,0.95));
      box-shadow:
        0 20px 60px rgba(0,0,0,0.22),
        0 0 0 8px rgba(255,255,255,0.18),
        0 0 40px rgba(255,255,255,0.42);
      animation: popIn .9s ease, cardFloat 4.5s ease-in-out infinite;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 34px;
      padding: 7px;
      background: linear-gradient(135deg, #ffd700, #fff4a8, #ff75a0, #ffd700);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
      transform: translateX(-120%);
      animation: shine 4.5s linear infinite;
      pointer-events: none;
    }

    @keyframes shine {
      100% { transform: translateX(120%); }
    }

    @keyframes popIn {
      0% {
        transform: scale(.85) rotate(-2deg);
        opacity: 0;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      margin: 0 0 18px;
      text-align: center;
      font-size: clamp(2rem, 8vw, 3.5rem);
      line-height: 1.02;
      font-weight: 1000;
      color: #ff2f74;
      text-shadow:
        0 2px 0 #ffffff,
        0 6px 18px rgba(255, 72, 132, 0.35),
        0 0 20px rgba(255,255,255,0.55);
      animation: titlePulse 2.4s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    @keyframes titlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .img-wrap {
      position: relative;
      width: 100%;
      border-radius: 26px;
      padding: 10px;
      background: linear-gradient(135deg, #ffd700, #fff7b8, #ff8db3, #ffd700);
      box-shadow:
        0 14px 30px rgba(255, 117, 160, 0.35),
        0 0 0 4px rgba(255,255,255,0.78);
      animation: frameGlow 2.6s ease-in-out infinite;
    }

    @keyframes frameGlow {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 14px 30px rgba(255, 117, 160, 0.35),
          0 0 0 4px rgba(255,255,255,0.78);
      }
      50% {
        transform: scale(1.015);
        box-shadow:
          0 20px 42px rgba(255, 117, 160, 0.46),
          0 0 0 6px rgba(255,255,255,0.9);
      }
    }

    img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 20px;
      border: 5px solid #fff;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
    }

    .crown-left,
    .crown-right {
      position: absolute;
      top: -8px;
      font-size: clamp(26px, 6vw, 42px);
      z-index: 6;
      animation: bounce 2s ease-in-out infinite;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.18));
    }

    .crown-left {
      left: -6px;
      animation-delay: 0s;
    }

    .crown-right {
      right: -6px;
      animation-delay: .5s;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(-6deg); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      z-index: 9999;
      pointer-events: none;
      border-radius: 3px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(115vh) rotate(760deg);
        opacity: .95;
      }
    }

    @media (max-width: 480px) {
      .card {
        width: 94vw;
        padding: 14px;
        border-radius: 26px;
      }

      .card::before {
        border-radius: 26px;
      }

      .img-wrap {
        border-radius: 20px;
        padding: 8px;
      }

      img {
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="sparkles">
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
  </div>

  <div class="hearts">
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💗</div>
    <div class="heart">💘</div>
    <div class="heart">💞</div>
    <div class="heart">💓</div>
    <div class="heart">💖</div>
    <div class="heart">💕</div>
  </div>

  <div class="card">
    <div class="crown-left">👑</div>
    <div class="crown-right">👑</div>
    <h1>World's Best Girlfriend</h1>
    <div class="img-wrap">
      <img src="emma.png" alt="Emma" />
    </div>
  </div>

  <script>
    const colors = [
      "#ff2f74", "#ffd700", "#ffffff", "#7dd3fc",
      "#c084fc", "#86efac", "#ff9f43", "#ff7eb3"
    ];

    function createConfetti() {
      const piece = document.createElement("div");
      piece.className = "confetti";

      const size = Math.random() * 10 + 7;
      piece.style.width = size + "px";
      piece.style.height = size * 1.6 + "px";
      piece.style.left = Math.random() * window.innerWidth + "px";
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (Math.random() * 2 + 2.2) + "s";
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;

      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 5000);
    }

    function dropConfetti(amount = 160) {
      for (let i = 0; i < amount; i++) {
        setTimeout(createConfetti, i * 16);
      }
    }

    window.addEventListener("load", () => {
      dropConfetti(220);
      setInterval(() => dropConfetti(40), 2200);
    });
  </script>
</body>
</html>
